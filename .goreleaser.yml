version: 2

builds:
  - id: humrun
    main: .
    binary: humrun
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: humsafe
    main: ./cmd/humsafe
    binary: humsafe
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: humrun
    builds:
      - humrun
    format: tar.gz
    name_template: "humrun_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  - id: humsafe
    builds:
      - humsafe
    format: tar.gz
    name_template: "humsafe_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^style:"

release:
  github:
    owner: GeorgeQLe
    name: hum
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
