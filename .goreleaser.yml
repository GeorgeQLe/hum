version: 2

builds:
  - id: devctl
    main: .
    binary: devctl
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: devctl
    builds:
      - devctl
    format: tar.gz
    name_template: "devctl_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^style:"

release:
  github:
    owner: GeorgeQLe
    name: dev-runner-cli
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
